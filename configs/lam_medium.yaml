model:
  image_channels: 3

  lam_model_dim: 768
  lam_latent_dim: 32
  lam_patch_size: 16
  lam_enc_blocks: 16
  lam_dec_blocks: 16
  lam_num_heads: 12

  beta: 0.000001
  log_interval: 1000
  log_path: outputs/lam_medium/imgs
  optimizer:
    class_path: torch.optim.AdamW
    init_args:
      lr: 2.5e-5
      weight_decay: 1e-2

data:
  batch_size: 40
  dataset_paths:
    - /media/data1/chan/PhysicalAI-Robotics-GR00T-Teleop-GR1/GR1_robot
  padding: repeat
  randomize: true
  num_frames: 2
  output_format: t h w c
  samples_per_epoch: 100000
  sampling_strategy: dataset

trainer:
  max_epochs: 1000
  accelerator: gpu
  num_nodes: 1
  devices: 0,1
  strategy: ddp_find_unused_parameters_false
  precision: 16-mixed
  log_every_n_steps: 100
  accumulate_grad_batches: 2
  gradient_clip_val: 0.3

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: outputs/lam_medium/ckpts
        verbose: true
        save_last: true
        save_top_k: -1

  logger:
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        save_dir: outputs/lam_medium/logs
        name: lam_medium
        log_model: false
